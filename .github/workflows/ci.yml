name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Linting & Formatting (pre-commit) ──────────────────────────────
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1

  # ── 2. Tests (pytest matrix) ───────────────────────────────────────────
  test:
    name: "Tests – Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}"
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.1"]
        include:
          - python-version: "3.12"
            django-version: "5.2"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django~=${{ matrix.django-version }}.0"
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest --tb=short -q --cov=djangocms_cookie_love --cov-report=term-missing

  # ── 3. Migrations check ───────────────────────────────────────────────
  migrations:
    name: Migrations check
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check no missing migrations
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
        run: |
          python -m django makemigrations --check --dry-run --verbosity=2

      - name: Verify migrations apply cleanly
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
        run: |
          python -m django migrate --verbosity=2
